x-smoke-base: &smoke-base
  build:
    context: .

services:
  gateway-api:
    build:
      context: .
    command: ["python", "-m", "src.services.gateway.main"]
    ports:
      - "8000:8000"
    depends_on:
      game-service:
        condition: service_started
      emoji-catalog-service:
        condition: service_started
      render-service:
        condition: service_started
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      SESSION_COOKIE_SECRET: "replace-me"
      GAME_SERVICE_BASE_URL: "http://game-service:8010"
      CATALOG_SERVICE_BASE_URL: "http://emoji-catalog-service:8020"
      RENDER_SERVICE_BASE_URL: "http://render-service:8030"
      INTERNAL_HTTP_TIMEOUT_SECONDS: "30"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ['HEALTHCHECK_HOST']; port = os.environ['API_PORT']; urllib.request.urlopen(f'http://{host}:{port}/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  game-service:
    build:
      context: .
    command: ["python", "-m", "src.services.game.main"]
    environment:
      GAME_SERVICE_HOST: "0.0.0.0"
      GAME_SERVICE_PORT: "8010"
      CHALLENGE_STORAGE_BACKEND: "file"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ['HEALTHCHECK_HOST']; port = os.environ['GAME_SERVICE_PORT']; urllib.request.urlopen(f'http://{host}:{port}/internal/game/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  emoji-catalog-service:
    build:
      context: .
    command: ["python", "-m", "src.services.emoji_catalog.main"]
    environment:
      CATALOG_SERVICE_HOST: "0.0.0.0"
      CATALOG_SERVICE_PORT: "8020"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ['HEALTHCHECK_HOST']; port = os.environ['CATALOG_SERVICE_PORT']; urllib.request.urlopen(f'http://{host}:{port}/internal/catalog/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  render-service:
    build:
      context: .
    command: ["python", "-m", "src.services.render.main"]
    environment:
      RENDER_SERVICE_HOST: "0.0.0.0"
      RENDER_SERVICE_PORT: "8030"
      GAME_SERVICE_BASE_URL: "http://game-service:8010"
      INTERNAL_HTTP_TIMEOUT_SECONDS: "30"
      DAILY_CHALLENGE_MAX_GUESSES: 5
    depends_on:
      game-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ['HEALTHCHECK_HOST']; port = os.environ['RENDER_SERVICE_PORT']; urllib.request.urlopen(f'http://{host}:{port}/internal/render/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: .
    command: ["python", "-m", "src.frontend.main"]
    ports:
      - "8001:8001"
    depends_on:
      gateway-api:
        condition: service_started
    environment:
      API_BASE_URL: "http://gateway-api:8000"
      FRONTEND_HOST: "0.0.0.0"
      FRONTEND_PORT: "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ['HEALTHCHECK_HOST']; port = os.environ['FRONTEND_PORT']; urllib.request.urlopen(f'http://{host}:{port}/', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
