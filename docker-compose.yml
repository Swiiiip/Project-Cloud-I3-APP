services:
  api:
    build: .
    command: python -m src.api.main
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "${API_PORT}:${API_PORT}"

  frontend:
    build: .
    command: python -m src.frontend.main
    environment:
      - API_BASE_URL=http://api:8000
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=8001
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - api
