global:
  imagePullPolicy: Always

replicas:
  gateway: 3
  gameEngine: 2
  emojiCatalog: 2
  emojiRender: 2
  frontend: 2

ingress:
  host: localhost   # would replace with real host for production, like blurmoji.com
  tlsSecretName: blurmoji-tls

config:
  challengeStorageBackend: game_state_storage

infra:
  gameStateStorage:
    enabled: true
  fileStorage:
    enabled: false

secrets:
  sessionCookieSecret: replace-in-cluster

cron:
  precompute:
    schedule: "0 0 * * *"
  emojiSync:
    schedule: "0 */12 * * *"
