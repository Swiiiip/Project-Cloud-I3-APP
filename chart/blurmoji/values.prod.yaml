global:
  imagePullPolicy: Always

replicas:
  gateway: 3
  game: 2
  catalog: 2
  render: 2
  frontend: 2

ingress:
  host: blurmoji.example.com
  tlsSecretName: blurmoji-tls


secrets:
  sessionCookieSecret: replace-in-cluster

cron:
  precompute:
    schedule: "0 0 * * *"
  emojiSync:
    schedule: "0 */12 * * *"
