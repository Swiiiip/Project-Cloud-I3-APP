apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "blurmoji.fullname" . }}-daily-precompute
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cron.precompute.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: precompute
              image: {{ include "blurmoji.curlImage" . }}
              imagePullPolicy: {{ .Values.global.imagePullPolicy }}
              args:
                - /bin/sh
                - -c
                - 'curl -fsS "http://{{ include "blurmoji.fullname" . }}-game-engine:{{ .Values.servicePorts.gameEngine }}/internal/game_engine/start?session_id=cron-precompute"'
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "blurmoji.fullname" . }}-emoji-sync
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cron.emojiSync.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: emoji-sync
              image: {{ include "blurmoji.curlImage" . }}
              imagePullPolicy: {{ .Values.global.imagePullPolicy }}
              args:
                - /bin/sh
                - -c
                - 'curl -fsS "http://{{ include "blurmoji.fullname" . }}-emoji-catalog:{{ .Values.servicePorts.emojiCatalog }}/internal/emoji_catalog/supported_emojis" > /dev/null'
