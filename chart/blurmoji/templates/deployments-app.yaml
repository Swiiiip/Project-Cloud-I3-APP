apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blurmoji.fullname" . }}-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas.gateway }}
  selector:
    matchLabels:
      app: {{ include "blurmoji.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "blurmoji.fullname" . }}-gateway
    spec:
      containers:
        - name: gateway
          image: {{ include "blurmoji.appImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["python", "-m", "src.services.gateway.main"]
          envFrom:
            - configMapRef:
                name: {{ include "blurmoji.fullname" . }}-runtime-config
            - secretRef:
                name: {{ include "blurmoji.fullname" . }}-secret
          ports:
            - containerPort: {{ .Values.servicePorts.gateway }}
