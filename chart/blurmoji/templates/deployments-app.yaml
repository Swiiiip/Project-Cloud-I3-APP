apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blurmoji.fullname" . }}-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas.gateway }}
  selector:
    matchLabels:
      app: {{ include "blurmoji.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "blurmoji.fullname" . }}-gateway
    spec:
      containers:
        - name: gateway
          image: {{ include "blurmoji.appImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["python", "-m", "src.services.gateway.main"]
          envFrom:
            - configMapRef:
                name: {{ include "blurmoji.fullname" . }}-runtime-config
            - secretRef:
                name: {{ include "blurmoji.fullname" . }}-secret
          ports:
            - containerPort: {{ .Values.servicePorts.gateway }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blurmoji.fullname" . }}-game-engine
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas.gameEngine }}
  selector:
    matchLabels:
      app: {{ include "blurmoji.fullname" . }}-game-engine
  template:
    metadata:
      labels:
        app: {{ include "blurmoji.fullname" . }}-game-engine
    spec:
      containers:
        - name: game-engine
          image: {{ include "blurmoji.appImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["python", "-m", "src.services.game_engine.main"]
          envFrom:
            - configMapRef:
                name: {{ include "blurmoji.fullname" . }}-runtime-config
            - configMapRef:
                name: {{ include "blurmoji.fullname" . }}-storage-config
          ports:
            - containerPort: {{ .Values.servicePorts.gameEngine }}
          {{- if .Values.infra.fileStorage.enabled }}
          volumeMounts:
            - name: challenge-data
              mountPath: /app/data
          {{- end }}
      {{- if .Values.infra.fileStorage.enabled }}
      volumes:
        - name: challenge-data
          emptyDir: {}
      {{- end }}
---
