apiVersion: v1
kind: ConfigMap
metadata:
  name: blurmoji-smoke-config
  namespace: blurmoji
data:
  SMOKE_GATEWAY_BASE_URL: "http://blurmoji-gateway:8000"
  SMOKE_PUBLIC_BASE_URL: "http://blurmoji-gateway:8000"
  SMOKE_FRONTEND_BASE_URL: "http://blurmoji-frontend:8001"
  SMOKE_GAME_SERVICE_BASE_URL: "http://blurmoji-game:8010"
  SMOKE_CATALOG_SERVICE_BASE_URL: "http://blurmoji-catalog:8020"
  SMOKE_RENDER_SERVICE_BASE_URL: "http://blurmoji-render:8030"
  SMOKE_QUEUE_CONCURRENCY: "40"
  SMOKE_QUEUE_ITERATIONS_PER_USER: "4"
  SMOKE_QUEUE_DELAY_THRESHOLD_SECONDS: "2.0"
  SMOKE_CONCURRENT_SESSION_COUNT: "100"
  SMOKE_STRESS_TOTAL_REQUESTS: "500"
  SMOKE_STRESS_CONCURRENCY: "40"
  SMOKE_STRESS_MAX_ERROR_RATE: "0.03"
  SMOKE_STRESS_P95_MAX_SECONDS: "2.0"
  SMOKE_REDIS_HOST: "blurmoji-redis"
  SMOKE_REDIS_PORT: "6379"

