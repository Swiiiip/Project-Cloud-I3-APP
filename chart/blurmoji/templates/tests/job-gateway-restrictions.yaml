apiVersion: batch/v1
kind: Job
metadata:
  name: blurmoji-smoke-gateway-restrictions
  namespace: blurmoji
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-gateway-restrictions
          image: blurmoji/tests:latest
          command: ["python", "-m", "src.tests.smoke.run_suite", "--scenario", "gateway_restrictions"]
          envFrom:
            - configMapRef:
                name: blurmoji-smoke-config

