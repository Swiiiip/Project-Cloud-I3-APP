apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "blurmoji.fullname" . }}-storage-config
  namespace: {{ .Values.global.namespace }}
data:
  CHALLENGE_STORAGE_BACKEND: {{ .Values.config.challengeStorageBackend | quote }}
  {{- if .Values.infra.gameStateStorage.enabled }}
  GAME_STATE_STORAGE_HOST: "{{ include "blurmoji.fullname" . }}-game-state-storage"
  {{- end }}
