global:
  namespace: blurmoji
  imagePullPolicy: IfNotPresent

image: blurmoji:1.0

servicePorts:
  gateway: 8000
  game: 8010
  catalog: 8020
  render: 8030
  frontend: 8001
  redis: 6379

replicas:
  gateway: 1
  game: 1
  catalog: 1
  render: 1
  frontend: 1

ingress:
  enabled: true
  className: nginx
  host: blurmoji.local
  tlsSecretName: ""

config:
  internalHttpTimeoutSeconds: "30"
  challengeStorageBackend: "redis"
  challengeStorageFilePath: ""
  redisDb: "0"
  redisTtlSeconds: "172800"

secrets:
  sessionCookieSecret: change-me

cron:
  precompute:
    schedule: "0 0 * * *"
  emojiSync:
    schedule: "0 */12 * * *"

