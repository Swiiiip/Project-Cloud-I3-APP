global:
  namespace: blurmoji
  imagePullPolicy: IfNotPresent

images:
  app:
    repository: blurmoji
    tag: "1.0"
  gameStateStorage:
    repository: redis
    tag: "7-alpine"
  curl:
    repository: curlimages/curl
    tag: "8.11.1"

servicePorts:
  gateway: 8000
  gameEngine: 8010
  emojiCatalog: 8020
  emojiRender: 8030
  frontend: 8001
  gameStateStorage: 6379

services:
  frontend:
    type: ClusterIP

replicas:
  gateway: 1
  gameEngine: 1
  emojiCatalog: 1
  emojiRender: 1
  frontend: 1

ingress:
  enabled: true
  className: nginx
  host: localhost
  tlsSecretName: ""

config:
  challengeStorageBackend: game_state_storage

infra:
  gameStateStorage:
    enabled: true
  fileStorage:
    enabled: false

secrets:
  sessionCookieSecret: change-me

cron:
  precompute:
    schedule: "0 0 * * *"
  emojiSync:
    schedule: "0 */12 * * *"

tests:
  enabled: false
