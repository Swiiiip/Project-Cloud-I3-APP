global:
  namespace: blurmoji
  imagePullPolicy: IfNotPresent

images:
  app:
    repository: blurmoji
    tag: "1.0"
  redis:
    repository: redis
    tag: "7-alpine"
  curl:
    repository: curlimages/curl
    tag: "8.11.1"

servicePorts:
  gateway: 8000
  game: 8010
  catalog: 8020
  render: 8030
  frontend: 8001
  redis: 6379

replicas:
  gateway: 1
  game: 1
  catalog: 1
  render: 1
  frontend: 1

ingress:
  enabled: true
  className: nginx
  host: blurmoji.local
  tlsSecretName: ""

config:
  bindHost: "0.0.0.0"
  internalHttpTimeoutSeconds: "30"
  dailyChallengeMaxGuesses: "5"
  emojiKitchenMetadataUrl: "https://raw.githubusercontent.com/xsalazar/emoji-kitchen-backend/main/app/metadata.json"
  challengeStorageBackend: "redis"
  redisDb: "0"
  redisTtlSeconds: "172800"

secrets:
  sessionCookieSecret: change-me

cron:
  precompute:
    schedule: "0 0 * * *"
  emojiSync:
    schedule: "0 */12 * * *"

