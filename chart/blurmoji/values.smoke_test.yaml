x-env:
  gateway: &env_gateway
    API_HOST: 0.0.0.0
    API_PORT: "8000"
    HEALTHCHECK_HOST: 127.0.0.1
    GAME_ENGINE_SERVICE_BASE_URL: http://game-engine-service:8010
    EMOJI_CATALOG_SERVICE_BASE_URL: http://emoji-catalog-service:8020
    EMOJI_RENDER_SERVICE_BASE_URL: http://emoji-render-service:8030
    INTERNAL_HTTP_TIMEOUT_SECONDS: "30"
    SESSION_COOKIE_SECRET: replace-me

  gameEngine: &env_game_engine
    GAME_ENGINE_SERVICE_HOST: 0.0.0.0
    GAME_ENGINE_SERVICE_PORT: "8010"
    CHALLENGE_STORAGE_BACKEND: file
    HEALTHCHECK_HOST: 127.0.0.1

  emojiCatalog: &env_emoji_catalog
    EMOJI_CATALOG_SERVICE_HOST: 0.0.0.0
    EMOJI_CATALOG_SERVICE_PORT: "8020"
    HEALTHCHECK_HOST: 127.0.0.1

  emojiRender: &env_emoji_render
    EMOJI_RENDER_SERVICE_HOST: 0.0.0.0
    EMOJI_RENDER_SERVICE_PORT: "8030"
    GAME_ENGINE_SERVICE_BASE_URL: http://game-engine-service:8010
    INTERNAL_HTTP_TIMEOUT_SECONDS: "30"
    HEALTHCHECK_HOST: 127.0.0.1

  frontend: &env_frontend
    API_BASE_URL: http://gateway-api:8000
    FRONTEND_HOST: 0.0.0.0
    FRONTEND_PORT: "8001"
    HEALTHCHECK_HOST: 127.0.0.1

  smokeCommon: &env_smoke_common
    SMOKE_GATEWAY_BASE_URL: http://gateway-api:8000
    SMOKE_PUBLIC_BASE_URL: http://gateway-api:8000
    SMOKE_FRONTEND_BASE_URL: http://frontend:8001
    SMOKE_GAME_ENGINE_SERVICE_BASE_URL: http://game-engine-service:8010
    SMOKE_EMOJI_CATALOG_SERVICE_BASE_URL: http://emoji-catalog-service:8020
    SMOKE_EMOJI_RENDER_SERVICE_BASE_URL: http://emoji-render-service:8030
    SMOKE_CONCURRENT_SESSION_COUNT: "100"
    SMOKE_QUEUE_CONCURRENCY: "40"
    SMOKE_QUEUE_ITERATIONS_PER_USER: "4"
    SMOKE_QUEUE_DELAY_THRESHOLD_SECONDS: "2.0"
    SMOKE_STRESS_TOTAL_REQUESTS: "500"
    SMOKE_STRESS_CONCURRENCY: "40"
    SMOKE_STRESS_MAX_ERROR_RATE: "0.03"
    SMOKE_STRESS_P95_MAX_SECONDS: "2.0"

services:
  gateway-api:
    environment: *env_gateway

  game-engine-service:
    environment: *env_game_engine

  emoji-catalog-service:
    environment: *env_emoji_catalog

  emoji-render-service:
    environment: *env_emoji_render

  frontend:
    environment: *env_frontend

  smoke-test-queue-delay:
    environment: *env_smoke_common

  smoke-test-concurrent-sessions:
    environment: *env_smoke_common

  smoke-test-gateway-restrictions:
    environment: *env_smoke_common

  smoke-test-stress:
    environment: *env_smoke_common

  smoke-test-connectivity:
    environment: *env_smoke_common
