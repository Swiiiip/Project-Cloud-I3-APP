apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blurmoji.fullname" . }}-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas.gateway }}
  selector:
    matchLabels:
      app: {{ include "blurmoji.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "blurmoji.fullname" . }}-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.images.gateway }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "blurmoji.fullname" . }}-config
            - secretRef:
                name: {{ include "blurmoji.fullname" . }}-secret
          ports:
            - containerPort: {{ .Values.servicePorts.gateway }}
